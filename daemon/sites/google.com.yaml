domain: google.com
knowledge: "Google Search engine — general search, text, images, news."
ui:
  search_input: "textarea[name='q'], input[name='q']"
  search_button: "input[value='Google Search'], button[aria-label='Google Search']"
  results: "#search .g"
recipes:
  - name: search
    steps:
      - action: fill
        selector: "{{ui.search_input}}"
        value: "{{query}}"
      - action: click
        selector: "{{ui.search_button}}"
      - action: wait_for
        selector: "{{ui.results}}"
