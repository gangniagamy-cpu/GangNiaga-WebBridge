domain: 'canva.com'
name: 'Canva'
description: 'Graphic design platform'
selectors:
  login_button: "button[data-testid='header-login-button']"
  signup_button: "button[data-testid='header-signup-button']"
  search_input: "input[type='search'][placeholder*='design']"
  create_design_btn: "button[data-testid='create-design-button']"
recipes:
  search_templates:
    description: 'Search for design templates on Canva'
    steps:
      - action: fill
        selector: "input[type='search'][placeholder*='design']"
      - action: hotkey
        keys: ['enter']
